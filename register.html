<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sportsphere - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header">
        <div class="header-content">
            <h1>SPORTSPHERE</h1>
            <nav class="nav-menu">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="leagues.html">Leagues</a></li>
                    <li><a href="register.html" class="active">Register</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <section class="intro-section">
            <h2>Create an Account</h2>
            <p>Join Sportsphere today and never miss a moment.</p>
        </section>

        <section class="form-container" style="max-width: 400px; margin: 0 auto;">
            <div class="card">
                <form action="#" method="POST">
                    <div style="margin-bottom: 15px; text-align: left;">
                        <label for="username" style="display: block; margin-bottom: 5px; font-weight: bold;">Username:</label>
                        <input type="text" id="username" name="username" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;">
                    </div>
                    
                    <div style="margin-bottom: 15px; text-align: left;">
                        <label for="email" style="display: block; margin-bottom: 5px; font-weight: bold;">Email:</label>
                        <input type="email" id="email" name="email" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;">
                    </div>
                    
                    <div style="margin-bottom: 20px; text-align: left;">
                        <label for="password" style="display: block; margin-bottom: 5px; font-weight: bold;">Password:</label>
                        <input type="password" id="password" name="password" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;">
                    </div>

                    <button type="submit" style="width: 100%; padding: 10px; background-color: #1e3a8a; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer;">Register</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Sportsphere. All rights reserved.</p>
    </footer>

</body>
</html>
