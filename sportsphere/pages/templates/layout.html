<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportSphere - عالم الرياضة</title>
    <style>
      
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #1a252f;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .logo {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        .logo span {
            color: #3498db; 
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            color: #cbd5e1;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            color: #fff;
            background-color: #2c3e50;
        }

        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            flex: 1; /* يضمن دفع الفوتر لأسفل الصفحة دائماً */
            width: 100%;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        footer {
            background-color: #1a252f;
            color: #94a3b8;
            text-align: center;
            padding: 20px;
            font-size: 14px;
            border-top: 4px solid #3498db;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="/" class="logo">Sport<span>Sphere</span></a>
            <ul class="nav-links">
                <li><a href="/">الرئيسية</a></li>
                <li><a href="/leagues/">الدوريات</a></li>
                <li><a href="/teams/">الفرق</a></li>
                <li><a href="/about/">من نحن</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 SportSphere. جميع الحقوق محفوظة.</p>
    </footer>

</body>
</html>
